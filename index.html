<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大米*主页</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ===== 全局重置与字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
            color: #fff;
            overflow-x: hidden;
        }

        /* ===== 固定背景层 ===== */
        .bg-frost {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1600&q=80');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px) brightness(0.9);
            transform: scale(1.02);
        }

        .bg-frost::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.02);
            background-image: radial-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 4px 4px;
            pointer-events: none;
        }

        /* ===== 左侧黑胶唱片 ===== */
        .record {
            position: fixed;
            left: -400px;
            top: 12.5vh;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            box-shadow: 
                0 25px 35px rgba(0, 0, 0, 0.8),
                inset 0 -15px 25px rgba(0, 0, 0, 0.9),
                inset 0 15px 35px rgba(255, 255, 255, 0.15);
            transition: left 0.5s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.3s;
            z-index: 10;
        }

        .record:hover {
            left: -150px;
            box-shadow: 0 35px 45px rgba(0, 0, 0, 0.9), inset 0 -15px 25px #000;
        }

        .record-disc {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #0a0a0a;
            background-image: 
                repeating-radial-gradient(circle at 50% 50%, 
                    #2d2d2d 0px, 
                    #2d2d2d 2px, 
                    #1a1a1a 2px, 
                    #1a1a1a 6px,
                    #3f3f3f 6px,
                    #3f3f3f 8px,
                    #1a1a1a 8px,
                    #1a1a1a 12px),
                radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.3) 0%, transparent 40%),
                radial-gradient(circle at 70% 70%, rgba(255, 240, 200, 0.25) 0%, transparent 50%),
                repeating-radial-gradient(circle at 50% 50%, 
                    rgba(255, 255, 255, 0.08) 0px, 
                    rgba(255, 255, 200, 0.1) 4px, 
                    transparent 4px, 
                    transparent 10px);
            background-blend-mode: overlay, normal, normal, normal;
            animation: vinyl-rotate 20s infinite linear;
            position: relative;
        }

        .record-inner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 190px;
            height: 190px;
            border-radius: 50%;
            background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=80');
            background-size: cover;
            background-position: center;
            border: 8px solid #2a2a2a;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8), 0 8px 20px black;
            z-index: 2;
        }
        .record-inner::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,240,0.2), transparent 70%);
            pointer-events: none;
        }

        .play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            color: white;
            font-size: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease, background 0.2s;
            z-index: 100;
            box-shadow: 0 0 25px rgba(255,215,0,0.4);
            pointer-events: none;
        }

        .record:hover .play-btn {
            opacity: 1;
            pointer-events: auto;
        }

        .play-btn:hover {
            background: rgba(30, 30, 30, 0.9);
            border-color: #fff;
            transform: translate(-50%, -50%) scale(1.05);
        }

        @keyframes vinyl-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* ===== 主内容区 (严格居中) ===== */
        .main-content {
            position: relative;
            z-index: 20;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            pointer-events: none;
        }

        .content-card {
            max-width: 700px;
            width: 100%;
            background: rgba(20, 20, 20, 0.3);
            backdrop-filter: blur(6px);
            border-radius: 48px;
            padding: 3rem 2.5rem;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            margin-bottom: 1.8rem;
            transition: transform 0.3s;
        }
        .avatar:hover {
            transform: scale(1.02);
        }

        /* ===== WELCOME 字体：Times New Roman + 亮金渐变，无阴影 ===== */
        .welcome-text {
            font-size: 3.8rem;
            font-weight: 700;
            letter-spacing: 8px;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
            font-family: 'Times New Roman', Times, serif;
            background: linear-gradient(135deg, #f5d742, #ffd966, #f5d742);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: glowFlow 6s ease infinite;
            text-shadow: none;
            line-height: 1.2;
        }

        @keyframes glowFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .button-group {
            display: flex;
            gap: 1.8rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2.5rem;
        }
        .btn {
            padding: 0.9rem 2rem;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(4px);
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(255,255,255,0.2);
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn i {
            margin-right: 6px;
        }
        .btn:hover {
            background: rgba(60, 60, 60, 0.9);
            transform: translateY(-4px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.5);
            border-color: #ffd966;
        }

        /* 视频网格 — 三列布局 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 2.5rem;
        }

        .video-item {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s, border-color 0.3s;
            backdrop-filter: blur(3px);
        }
        .video-item:hover {
            transform: scale(1.02);
            border-color: #ffd966;
        }
        .video-item img {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
        }
        .video-item .video-title {
            padding: 8px;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.5);
            color: #eee;
        }

        /* 动态插入的播放器行 — 跨三列，占据完整一行 */
        .dynamic-player-row {
            grid-column: 1 / -1;
            width: 100%;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px black;
            margin: 0;
        }
        .dynamic-player-row video {
            width: 100%;
            max-height: 360px;
            outline: none;
            display: block;
        }
        .dynamic-player-row iframe {
            width: 100%;
            height: 360px;
            border: none;
            border-radius: 20px;
            display: block;
        }
    </style>
</head>
<body>
    <div class="bg-frost"></div>

    <!-- 左侧黑胶唱片 -->
    <div class="record" id="vinylRecord">
        <div class="record-disc">
            <div class="record-inner" style="background-image: url('https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&q=80');"></div>
        </div>
        <div class="play-btn" id="playToggle"><i class="fas fa-pause" id="playIcon"></i></div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <div class="content-card">
            <!-- 头像示例链接 -->
            <img src="src/touxiang.jpg" alt="avatar" class="avatar">
            <!-- WELCOME 亮金文字 -->
            <h1 class="welcome-text">WELCOME</h1>

            <div class="button-group">
                <a href="https://space.bilibili.com/13713428?spm_id_from=333.1007.0.0" target="_blank" class="btn"><i class="fab fa-bilibili"></i> Bilibili</a>
                <a href="https://www.artstation.com/nsxjj" target="_blank" class="btn"><i class="fab fa-artstation"></i> ArtStation</a>
                <a href="https://example.com" target="_blank" class="btn"><i class="fas fa-film"></i> Show</a>
            </div>

            <!-- 视频网格：前5个为MP4，最后1个为B站iframe示例 -->
            <div class="video-grid" id="videoGrid">
                <div class="video-item" data-video-src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" data-poster="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/BigBuckBunny.jpg">
                    <img src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/BigBuckBunny.jpg" alt="Big Buck Bunny">
                    <div class="video-title">Big Buck Bunny</div>
                </div>
                <div class="video-item" data-video-src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4" data-poster="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/ElephantsDream.jpg">
                    <img src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/ElephantsDream.jpg" alt="Elephants Dream">
                    <div class="video-title">Elephants Dream</div>
                </div>
                <div class="video-item" data-video-src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" data-poster="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/ForBiggerBlazes.jpg">
                    <img src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/ForBiggerBlazes.jpg" alt="For Bigger Blazes">
                    <div class="video-title">For Bigger Blazes</div>
                </div>
                <div class="video-item" data-video-src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4" data-poster="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/ForBiggerEscapes.jpg">
                    <img src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/ForBiggerEscapes.jpg" alt="For Bigger Escape">
                    <div class="video-title">For Bigger Escape</div>
                </div>
                <div class="video-item" data-video-src="http://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4" data-poster="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/ForBiggerFun.jpg">
                    <img src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/images/ForBiggerFun.jpg" alt="For Bigger Fun">
                    <div class="video-title">For Bigger Fun</div>
                </div>
                <!-- B站视频示例（使用 iframe） -->
                <div class="video-item" data-iframe-src="https://player.bilibili.com/player.html?isOutside=true&aid=115305309345975&bvid=BV1BfHKzXEC1&cid=32799328044&p=1" data-poster="https://i2.hdslb.com/bfs/archive/e2015a5786574975b75e30fc796a35b7366b073c.jpg@672w_378h_1c_!web-search-common-cover.avif">
                    <img src="https://i2.hdslb.com/bfs/archive/e2015a5786574975b75e30fc796a35b7366b073c.jpg@672w_378h_1c_!web-search-common-cover.avif" alt="B站示例">
                    <div class="video-title">B站示例视频</div>
                </div>
            </div>

            <!-- 原播放器模板已移除，改为动态创建 -->
        </div>
    </div>

    <script>
        (function() {
            // ===== 唱片音乐播放控制 (保持不变) =====
            const playBtn = document.getElementById('playToggle');
            const playIcon = document.getElementById('playIcon');

            const bgAudio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
            bgAudio.loop = true;
            bgAudio.volume = 0.3;

            let isPlaying = false;

            bgAudio.play().then(() => {
                isPlaying = true;
                playIcon.className = 'fas fa-pause';
            }).catch(e => {
                console.log("自动播放被阻止", e);
                isPlaying = false;
                playIcon.className = 'fas fa-play';
            });

            function togglePlay() {
                if (isPlaying) {
                    bgAudio.pause();
                    playIcon.className = 'fas fa-play';
                } else {
                    bgAudio.play().catch(e => alert("请先与页面交互"));
                    playIcon.className = 'fas fa-pause';
                }
                isPlaying = !isPlaying;
            }

            bgAudio.addEventListener('play', () => {
                isPlaying = true;
                playIcon.className = 'fas fa-pause';
            });
            bgAudio.addEventListener('pause', () => {
                isPlaying = false;
                playIcon.className = 'fas fa-play';
            });

            playBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                togglePlay();
            });

            // ========== 视频播放：支持 MP4 和 iframe，点击开关 ==========
            const videoItems = document.querySelectorAll('.video-item');

            let activeVideoItem = null; // 当前打开播放器的小窗元素

            // 移除已有的动态播放器行
            function removeExistingPlayer() {
                const existing = document.querySelector('.dynamic-player-row');
                if (existing) {
                    existing.remove();
                    activeVideoItem = null;
                }
            }

            // 根据点击项创建播放器行（video 或 iframe）
            function createPlayerRow(item) {
                const videoSrc = item.dataset.videoSrc;
                const iframeSrc = item.dataset.iframeSrc;
                const poster = item.dataset.poster || '';

                const rowDiv = document.createElement('div');
                rowDiv.className = 'dynamic-player-row';

                if (iframeSrc) {
                    // 创建 iframe 播放器
                    const iframe = document.createElement('iframe');
                    iframe.src = iframeSrc;
                    iframe.setAttribute('frameborder', '0');
                    iframe.setAttribute('allowfullscreen', 'true');
                    iframe.setAttribute('scrolling', 'no');
                    iframe.style.width = '100%';
                    iframe.style.height = '360px';
                    iframe.style.borderRadius = '20px';
                    rowDiv.appendChild(iframe);
                } else if (videoSrc) {
                    // 创建 video 播放器
                    const video = document.createElement('video');
                    video.controls = true;
                    video.controlsList = 'nodownload';
                    video.poster = poster;
                    video.src = videoSrc;
                    video.style.width = '100%';
                    video.style.maxHeight = '360px';
                    video.style.outline = 'none';
                    video.load();
                    // 尝试自动播放
                    video.play().catch(e => console.log('自动播放被阻止', e));
                    rowDiv.appendChild(video);
                }

                return rowDiv;
            }

            // 插入播放器行到指定行的最后一个元素后面
            function insertPlayerAfterRow(lastItemInRow, clickedItem) {
                const newPlayerRow = createPlayerRow(clickedItem);
                if (!newPlayerRow.hasChildNodes()) return; // 无有效数据则不创建

                lastItemInRow.insertAdjacentElement('afterend', newPlayerRow);
                newPlayerRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                activeVideoItem = clickedItem;
            }

            videoItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    // 如果点击项没有视频源也没有iframe源，则不处理
                    if (!item.dataset.videoSrc && !item.dataset.iframeSrc) return;

                    // 点击的是同一个项 → 关闭播放器
                    if (activeVideoItem === item) {
                        removeExistingPlayer();
                        return;
                    }

                    // 点击不同的项 → 移除旧的，然后插入新的
                    removeExistingPlayer();

                    // 找到被点击项所在行的最后一个元素
                    const itemsArray = Array.from(document.querySelectorAll('.video-item'));
                    const index = itemsArray.indexOf(item);
                    const rowLastIndex = Math.floor(index / 3) * 3 + 2; // 每行3个，该行最后一个索引
                    const lastIndex = Math.min(rowLastIndex, itemsArray.length - 1);
                    const lastItemInRow = itemsArray[lastIndex];

                    insertPlayerAfterRow(lastItemInRow, item);
                });
            });
        })();
    </script>
</body>
</html>
